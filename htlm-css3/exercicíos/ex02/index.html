<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e quebra de linha</h1>
    <hr>
    <p>Você pode escrever um parágrafo de qualquer jeito. Basta colocar tudo no meio do par de tags &lt;p&gt; e &lt;/p&gt;</p>
    <p>Se precisar quebrar o texto <br> em algum lugar você pode usar a tag &lt;br&gt;</p>
    
    <p>Vamos adicionar algums símbolos especiais:
        &reg;
        &copy;
        &euro;
        &pound;
        &cent;
        &Delta;
        &yen;
    </p>
    <p>Vamos adicionar alguns emojin:
        &#x2764;
        ❤️
    </p>
</body>
</html>
